version: '3.8'

services:
  php:
    build: ./docker/php
    container_name: distriforce-php-dev
    volumes:
      - ./src:/var/www/html
    extra_hosts:                         
      - "host.docker.internal:host-gateway"
    networks:
      - distriforce-network

  nginx:
    image: nginx:alpine
    container_name: distriforce-nginx-dev
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - distriforce-network

  mysql:
    image: mysql:8.0
    container_name: distriforce-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: distriforce_ai
      MYSQL_ROOT_PASSWORD: Softexpertise@2022
      MYSQL_USER: djamala
      MYSQL_PASSWORD: Softexpertise@2022
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - distriforce-network

networks:
  distriforce-network:
    driver: bridge

volumes:
  mysql_data:
